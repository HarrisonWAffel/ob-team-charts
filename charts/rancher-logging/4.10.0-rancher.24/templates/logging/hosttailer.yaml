{{- with .Values.logging.hostTailer }}
{{- if and $.Values.logging.enabled .enabled }}
---
apiVersion: logging-extensions.banzaicloud.io/v1alpha1
kind: HostTailer
metadata:
  name: {{ .name }}
  namespace: {{ include "logging-operator.namespace" $ }}
spec:
  {{- with .fileTailers }}
  fileTailers:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .systemdTailers }}
  systemdTailers:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  enableRecreateWorkloadOnImmutableFieldChange: {{ $.Values.logging.enableRecreateWorkloadOnImmutableFieldChange }}
  {{- with .workloadMetaOverrides }}
  workloadMetaOverrides:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- $workloadOverrides := .workloadOverrides | default dict }}
  {{- if $.Values.imagePullSecrets }}
    {{- $ipsOverride := dict "spec" (dict "template" (dict "spec" (dict "imagePullSecrets" $.Values.imagePullSecrets))) }}
    {{- $workloadOverrides = merge $workloadOverrides $ipsOverride }}
  {{- end }}
  {{- if $workloadOverrides }}
  workloadOverrides:
    {{- toYaml $workloadOverrides | nindent 4 }}
  {{- end }}
  {{- with .image }}
  image:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
