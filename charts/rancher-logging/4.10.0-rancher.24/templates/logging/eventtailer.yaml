{{- with $.Values.logging.eventTailer }}
{{- if and $.Values.logging.enabled .enabled }}
apiVersion: logging-extensions.banzaicloud.io/v1alpha1
kind: EventTailer
metadata:
  name: {{ .name }}
  namespace: {{ include "logging-operator.namespace" . }}
spec:
  controlNamespace: {{ $.Values.logging.controlNamespace | default $.Release.Namespace }}
  {{- with .image }}
  image:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .pvc }}
  {{- if .enabled }}
  positionVolume:
    pvc:
      spec:
        accessModes: {{ .accessModes }}
        resources:
          requests:
            storage: {{ .storage }}
        volumeMode: {{ .volumeMode }}
        {{- with .storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
  {{- end }}{{/* end if enabled */}}
  {{- end }}{{/* end with pvc */}}
  {{- with .workloadMetaOverrides }}
  workloadMetaOverrides:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- $workloadOverrides := .workloadOverrides | default dict }}
  {{- if $.Values.imagePullSecrets }}
    {{- $ipsOverride := dict "spec" (dict "template" (dict "spec" (dict "imagePullSecrets" $.Values.imagePullSecrets))) }}
    {{- $workloadOverrides = merge $workloadOverrides $ipsOverride }}
  {{- end }}
  {{- if $workloadOverrides }}
  workloadOverrides:
    {{- toYaml $workloadOverrides | nindent 4 }}
  {{- end }}
  {{- with .containerOverrides }}
  containerOverrides:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}{{/* end if enabled */}}
{{- end }}{{/* end with event-tailer */}}
